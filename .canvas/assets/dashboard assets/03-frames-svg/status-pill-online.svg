<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" fill="none" preserveAspectRatio="none">

<defs>
  <linearGradient id="glow" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#00e5ff"/>
    <stop offset="0.55" stop-color="#7d3cff"/>
    <stop offset="1" stop-color="#d4af37"/>
  </linearGradient>
  <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect x="8" y="8" width="344" height="80" rx="40" fill="#061018" fill-opacity="0.8" stroke="#00e5ff" stroke-opacity="0.65" stroke-width="2"/>
<circle cx="58" cy="48" r="13" fill="#34ff9a" filter="url(#softGlow)"/>
</svg>
