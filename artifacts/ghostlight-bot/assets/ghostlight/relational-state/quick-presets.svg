      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.34" stop-color="#f1ecff"/>
      <stop offset="0.68" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="fill" x1="108" y1="96" x2="414" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".68"/>
      <stop offset=".54" stop-color="#ddd6fe" stop-opacity=".30"/>
      <stop offset="1" stop-color="#6d28d9" stop-opacity=".14"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="48%" r="60%">
      <stop offset="0" stop-color="#ddd6fe" stop-opacity=".66"/>
      <stop offset=".55" stop-color="#a78bfa" stop-opacity=".18"/>
      <stop offset="1" stop-color="#6d28d9" stop-opacity="0"/>
