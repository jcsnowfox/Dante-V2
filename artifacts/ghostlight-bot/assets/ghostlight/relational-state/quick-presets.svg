<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Quick Presets</title>
  <desc id="desc">Ghostlight AI Relational State cinematic lavender SVG asset.</desc>
  <defs>
